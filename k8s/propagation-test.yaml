apiVersion: v1
kind: Namespace
metadata:
  name: propagation-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: propagation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
        - name: service-b
          image: YOUR_DOCKERHUB_USER/service-b:0.0.1
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: propagation-test
spec:
  selector:
    app: service-b
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: propagation-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
        - name: service-a
          image: YOUR_DOCKERHUB_USER/service-a:0.0.1
          env:
            - name: SERVICE_B_URL
              value: "http://service-b:8080/receive"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: propagation-test
spec:
  selector:
    app: service-a
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
